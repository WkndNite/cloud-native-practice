server:
  port: 9999

spring:
  application:
    name: gateway-service # ✅ 你自己的服务名，替代 @artifactId@ 占位符也行
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: crud-client
          uri: lb://crud-client
          filters:
            - StripPrefix=1
          predicates:
            - Path=/crud/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8888/eureka # ✅ 你的 Eureka 注册中心地址
